# config/settings.yaml
# Global configuration for ModularRAG

app:
  name: "ModularRAG"
  version: "2.0.0"
  environment: "development"

# ============================================================
# ARCHITECTURE SETTINGS
# ============================================================
# Choose which RAG architecture to use.
# Each architecture has its own config file in config/architectures/
architecture:
  active: "naive"
  # Options: naive, advanced, corrective, self_rag, agentic, adaptive, graph_rag

# ============================================================
# 1. LLM SETTINGS
# ============================================================
llm:
  mode: "local" # Options: 'local', 'cloud', 'custom'
  
  local:
    provider: "ollama"
    model_name: "mistral" # efficient for CPU
    base_url: "http://localhost:11434"
    
  cloud:
    provider: "openai" # Options: openai, anthropic, google
    model_name: "gpt-4o"

  # Custom Plugin Example:
  # custom:
  #   module_path: "src.plugins.my_llm"
  #   class_name: "MyCustomLLM"
  #   kwargs:
  #     temperature: 0.7

# ============================================================
# 2. EMBEDDING SETTINGS
# ============================================================
embedding:
  provider: "huggingface" # Options: huggingface (local), openai (cloud), google, custom
  
  huggingface:
    model_name: "sentence-transformers/all-MiniLM-L6-v2" # Small, fast, good for CPU
  
  openai:
    model_name: "text-embedding-3-small"

  google:
    model_name: "models/text-embedding-004"

# ============================================================
# 3. VECTOR STORE SETTINGS
# ============================================================
vector_db:
  provider: "chroma" # Options: chroma (local), pinecone (cloud), custom
  
  persist_directory: "./chroma_db"
  collection_name: "rag_collection"
  
  pinecone:
    index_name: "rag-index"

# ============================================================
# 4. RETRIEVER SETTINGS
# ============================================================
retriever:
  strategy: "basic"  # Options: basic, hybrid, reranked
  k: 5               # Number of documents to retrieve
  hybrid_weights: [0.5, 0.5]  # [vector_weight, bm25_weight] for hybrid

# ============================================================
# 5. RERANKER SETTINGS (used by Advanced RAG)
# ============================================================
reranker:
  provider: "cross_encoder"  # Options: cross_encoder (free), cohere (API key)
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  cohere_model: "rerank-english-v3.0"
  top_n: 5

# ============================================================
# 6. WEB SEARCH SETTINGS (used by Corrective, Agentic, Adaptive RAG)
# ============================================================
web_search:
  enabled: true          # On by default. Set to false to disable.
  provider: "duckduckgo"  # Options: tavily (API key), duckduckgo (free)
  max_results: 3

# ============================================================
# 7. HARDWARE SETTINGS
# ============================================================
compute:
  device: "cpu" # Options: cpu, cuda

# ============================================================
# 8. RAG BEHAVIOR
# ============================================================
rag:
  fallback_to_general_chat: true
  score_threshold: 1.5

# ============================================================
# 9. MEMORY SETTINGS
# ============================================================
memory:
  provider: "local" # Options: 'local', 'redis', 'custom'
  type: "window"    # Options: 'window', 'summary', 'vector'
  
  window_size: 10
  
  vector_memory:
    collection_name: "chat_memory"
    k: 5
  
  local:
    file_path: "chat_history.json"
    
  redis:
    url: "redis://localhost:6379"
    ttl: 86400

# ============================================================
# 10. GUARDRAILS SETTINGS
# ============================================================
guardrails:
  enabled: true
  
  validators:
    prompt_injection:
      enabled: true
      patterns: "default"
    
    input_length:
      enabled: true
      max_length: 10000
    
    special_characters:
      enabled: true
      max_ratio: 0.3
    
    pii_detector:
      enabled: true
      redact_types: ["email", "phone", "ssn", "credit_card"]
    
    empty_input:
      enabled: true

    topic_restriction:
      enabled: false
      allowed_topics: ["general knowledge", "technology", "science"]

    toxicity_filter:
      enabled: false

# ============================================================
# 11. MONITORING (Optional)
# ============================================================
# LangSmith tracing is auto-enabled if LANGSMITH_API_KEY is set.
# No configuration needed here. Just set these env vars:
#   LANGSMITH_API_KEY=your_key
#   LANGCHAIN_TRACING_V2=true
#   LANGCHAIN_PROJECT=ModularRAG